name: Churn MLOps CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v3

      - name: Python Setup
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Libraries
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Data
        run: python src/data/download_data.py

      - name: Clean Data
        run: python src/data/clean_data.py

      - name: Train Model
        run: python src/models/train.py